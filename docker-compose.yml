# ──────────────────────────────────────────────────────────────────────
# docker-compose.yml — локальная dev-среда с Postgres
# ──────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: beerid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beerid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beerid_dev}
      POSTGRES_DB: ${POSTGRES_DB:-beerid}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beerid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beerid-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-beerid}:${POSTGRES_PASSWORD:-beerid_dev}@postgres:5432/${POSTGRES_DB:-beerid}?schema=public
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
